name: pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: raven-actions/actionlint@v2

  check:
    needs: actionlint
    uses: ectobit/reusable-workflows/.github/workflows/go-check.yaml@main
    with:
      lint-command: make lint
      test-command: make test
